name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  changelog:
    name: "Generate Changelog"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: npm install

      - name: Generate Changelog
        if: ${{ !contains(github.ref, '-alpha') && !contains(github.ref, '-beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASER_TOKEN }}
        run: npx changelogithub --no-group
        continue-on-error: true

  publish-npm:
    name: "Publish: npm Registry"
    needs: [changelog]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for npm Trusted Publishing (OIDC)
      contents: read
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          # Node 24 bundles npm 11, whose OIDC handshake supports Trusted
          # Publishing. Node 22's bundled npm 10 fails the handshake and the
          # registry returns a misleading E404 on publish.
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: "Update npm"
        # Trusted Publishing (OIDC) requires npm >= 11.5.1; even Node 24's
        # bundled npm can ship below that, so pin to latest explicitly.
        run: npm install -g npm@latest

      - name: "Install Dependencies"
        run: npm install

      - name: Run eslint
        run: npm run lint

      - name: "Build"
        run: npm run build

      - name: "Publish"
        run: npm publish --access=public --registry=https://registry.npmjs.org --no-git-checks
